services:
  app_proxy:
    image: busybox:latest
    environment:
      APP_HOST: finance-asset-tracker_web_1
      APP_PORT: "8080"

  web:
    image: asridhar90/finance-asset-tracker:0.1.0
    user: "1000:1000"
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      # Umbrel sets APP_DATA_DIR; for local runs use: APP_DATA_DIR=. docker compose up
      - ${APP_DATA_DIR:-.}/data:/data
    environment:
      DATA_DIR: /data
