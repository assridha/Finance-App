version: "3.7"

services:
  app_proxy:
    image: busybox:latest
    environment:
      APP_HOST: finance-app_web_1
      APP_PORT: "8000"

  web:
    build: .
    user: "1000:1000"
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR:-./data}:/data
    environment:
      DATA_DIR: /data
